# mono-checkleft-release Buildkite pipeline.
#
# Cuts a GitHub Release of the `checkleft` binary on spinyfin/mono, tagged
# checkleft-vX.Y.Z-alpha.N, with prebuilt binaries for Linux and macOS attached
# as assets. checkleft is consumed as a prebuilt by external repos; this is the
# pipeline that produces what they pull.
#
# This is a SEPARATE pipeline from the main `mono` CI pipeline (it has its own
# cron schedule and its own manual trigger), modeled on the `boss-release` step
# in .buildkite/pipeline.yml. Registration is NOT automatic — see the operator
# checklist in tools/checkleft/docs/buildkite-release-setup.md.
#
# Trigger model (enforced inside checkleft-release.sh, BUILDKITE_SOURCE):
#   - scheduled (cron) builds  → skip unless checkleft changed since last tag.
#   - manual builds (ui / api) → always release.
# The pipeline should NOT be wired to build on push; releases come from the cron
# schedule and manual triggers, and the idempotency guard no-ops a re-run on an
# already-released commit.
#
# Agent targeting: every phase runs on the bazel-any queue (the shared Mac/Linux
# pool) pinned to its OS by agent tag (os: linux / os: darwin) — otherwise a
# phase can land on the wrong OS (the linux phase hard-fails if it lands on a
# Mac).
#
# Structure: a single static `prepare` step (skip-logic + version + tag +
# GitHub Release) fans out to the `linux`, `musl`, and `darwin` build steps
# ONLY when a release is actually being cut. The fan-out is dynamic: at the end
# of `prepare`, if a release was created, it calls `buildkite-agent pipeline
# upload .buildkite/pipeline-checkleft-release-builds.yml` to inject the build
# steps into the running build. On a no-release run (scheduled build, nothing
# changed) prepare exits without uploading that fragment, so the leaf steps
# never appear and no bazel builds run.
#
# The concurrency_group lives on `prepare` so two release runs can't create
# tags at once; the build steps are unconstrained (each run's builds attach to
# that run's own release).
#
# musl step: runs concurrently with linux/darwin; a musl failure fails the
# release (release-blocking, not soft_fail). The musl binary ships on the GitHub
# Release as checkleft-x86_64-unknown-linux-musl.

steps:
  - label: ":mag: checkleft-release (prepare)"
    key: "checkleft-release-prepare"
    command: ".buildkite/steps/checkleft-release.sh prepare"
    agents:
      queue: bazel-any
      os: linux
    concurrency: 1
    concurrency_group: "checkleft-release"
    retry:
      automatic: false
  # The linux/musl/darwin build steps are NOT listed here. They are injected
  # dynamically by `prepare` via `buildkite-agent pipeline upload
  # .buildkite/pipeline-checkleft-release-builds.yml` — but only when a release
  # is actually being cut. On a no-release run they never appear.
