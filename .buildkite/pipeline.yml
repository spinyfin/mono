# Boss/mono Buildkite CI pipeline.
#
# Override queues when testing agents:
#   BUILDKITE_ANY_QUEUE=agent-test
#   BUILDKITE_MACOS_QUEUE=macos-test

steps:
  - label: ":bazel: bazel-build-test"
    key: "bazel-build-test"
    command: ".buildkite/steps/bazel-build-test.sh"
    artifact_paths:
      - "bazel-out/**/extra_action_outputs/**/*"
      - "bazel-testlogs/**/test.log"
      - "bazel-testlogs/**/test.xml"
    agents:
      queue: "${BUILDKITE_ANY_QUEUE:-bazel-any}"
    notify:
      - github_commit_status:
          context: "buildkite/mono/bazel-build-test"

  - label: ":apple: mac-app-build"
    key: "mac-app-build"
    command: ".buildkite/steps/mac-app-build.sh"
    agents:
      queue: "${BUILDKITE_MACOS_QUEUE:-macos-arm64}"
    notify:
      - github_commit_status:
          context: "buildkite/mono/mac-app-build"

  - label: ":white_check_mark: checks"
    key: "checks"
    command: ".buildkite/steps/checks.sh"
    agents:
      queue: "${BUILDKITE_ANY_QUEUE:-bazel-any}"
    notify:
      - github_commit_status:
          context: "buildkite/mono/checks"

  - label: ":rocket: boss-release"
    key: "boss-release"
    if: build.branch == "main" && (build.source == "schedule" || build.source == "ui" || build.source == "api")
    command: ".buildkite/steps/boss-release.sh"
    depends_on:
      - "bazel-build-test"
      - "mac-app-build"
      - "checks"
    agents:
      queue: "${BUILDKITE_MACOS_QUEUE:-macos-arm64}"
    retry:
      automatic: false
    notify:
      - github_commit_status:
          context: "buildkite/mono/boss-release"
