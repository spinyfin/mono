[[checks]]
id = "rust-giant-structs-use-builder"

[checks.config]
builder = "bon"
# Grandfathered files containing structs with 6+ named fields and no bon::Builder.
# TODO: Convert each listed struct to use bon::Builder and remove the file from this list.
exclude_globs = [
  "tools/boss/bossctl/src/main.rs",
  "tools/boss/cli/src/main.rs",
  "tools/boss/client/src/lib.rs",
  "tools/boss/engine/src/app.rs",
  "tools/boss/engine/src/audit.rs",
  "tools/boss/engine/src/completion.rs",
  "tools/boss/engine/src/coordinator.rs",
  "tools/boss/engine/src/dispatch_events.rs",
  "tools/boss/engine/src/dispatch_reader.rs",
  "tools/boss/engine/src/external_tracker/github.rs",
  "tools/boss/engine/src/external_tracker/mod.rs",
  "tools/boss/engine/src/external_tracker/reconcile.rs",
  "tools/boss/engine/src/host_adapter.rs",
  "tools/boss/engine/src/host_registry.rs",
  "tools/boss/engine/src/live_status_loop.rs",
  "tools/boss/engine/src/merge_poller.rs",
  "tools/boss/engine/src/settings.rs",
  "tools/boss/engine/src/spawn_flow.rs",
  "tools/boss/engine/src/work/audit_misc.rs",
  "tools/boss/engine/src/work/mappers.rs",
  "tools/boss/engine/src/worker_registry.rs",
  "tools/boss/engine/src/worker_setup.rs",
  "tools/boss/protocol/src/engine_app.rs",
  "tools/boss/protocol/src/live_status_debug.rs",
  "tools/boss/protocol/src/live_worker_state.rs",
  "tools/boss/protocol/src/types.rs",
  "tools/boss/protocol/src/wire.rs",
]

[checks.policy]
severity = "error"
allow_bypass = true
