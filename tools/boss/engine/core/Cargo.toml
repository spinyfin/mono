[package]
name = "boss-engine"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = { workspace = true }
boss-build-info = { path = "../../build-info" }
boss-ci-log-reader = { path = "../ci-log-reader" }
boss-claude-client = { path = "../../claude_client" }
boss-github = { path = "../../github" }
boss-github-tracker = { path = "../../github_tracker" }
boss-trunk-auth = { path = "../../trunk_auth" }
boss-transcript-markdown = { path = "../transcript-markdown" }
boss-engine-automation-dedup = { path = "../automation-dedup" }
boss-engine-automation-schedule = { path = "../automation-schedule" }
async-trait = { workspace = true }
bon = { workspace = true }
chrono = { workspace = true }
git-utils = { path = "../../../../lib/rust/git_utils" }
boss-conflict-diagnosis = { path = "../conflict-diagnosis" }
boss-deterministic-resolvers = { path = "../deterministic-resolvers" }
boss-editorial = { path = "../editorial" }
boss-engine-driver = { path = "../driver" }
boss-engine-effort = { path = "../effort" }
boss-feature-flags = { path = "../feature-flags" }
boss-engine-gh-invocation = { path = "../gh-invocation" }
boss-engine-live-status-redact = { path = "../live-status-redact" }
boss-log-files = { path = "../../log-files" }
boss-metrics = { path = "../metrics" }
boss-engine-planner-validation = { path = "../planner-validation" }
boss-pr-review = { path = "../pr-review" }
boss-pr-template = { path = "../pr-template" }
boss-protocol = { path = "../../protocol" }
boss-ssh-transport = { path = "../ssh-transport" }
boss-engine-day-rotated-log = { path = "../day-rotated-log" }
boss-engine-transient-error = { path = "../transient-error" }
boss-engine-utils = { path = "../utils" }
boss-transcript-tail = { path = "../transcript-tail" }
clap = { workspace = true, features = ["derive"] }
fastrand = { workspace = true }
libc = "0.2"
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["full"] }
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter", "json"] }
shlex = { workspace = true }
rusqlite = { workspace = true }
regex = { workspace = true }
reqwest = { workspace = true, features = ["json"] }
rustls = { workspace = true }
sha2 = { workspace = true }
toml = { workspace = true }

[dev-dependencies]
boss-client = { path = "../../client" }
tempfile = { workspace = true }
wiremock = { workspace = true }
# test-util enables tokio's virtual-time controls (time::pause / advance,
# #[tokio::test(start_paused = true)]) used by the sweep_loop tests to
# drive the periodic loop deterministically without real sleeps. It is
# deliberately excluded from tokio's "full" feature set, so it must be
# opted into here for the test build.
tokio = { workspace = true, features = ["test-util"] }
