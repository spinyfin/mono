checks:
  - id: no-usfa-typo
    enabled: false

# ── declarative buildifier spike (not enabled — enabling would duplicate the
#    built-in `buildifier` check and break dogfooding CI) ──────────────────────
#
# To enable the declarative check in a repo that has adopted it, use the simple
# zero-install form (no implementation: line required):
#
#   checks:
#     - id: buildifier
#
# To use the checked-in (always-head) definition from disk instead of the
# bundled snapshot, add a check_definitions section:
#
#   check_definitions:
#     exec_paths:
#       - tools/checkleft/checks
#     allow_override_bundled: true
#
#   checks:
#     - id: buildifier
