[package]
name = "checkleft-file-forbidden-patterns"
version = "0.1.0"
edition.workspace = true
description = "checkleft check (file/forbidden-patterns): flag changed lines matching forbidden regex patterns, scoped to path globs"

# An ordinary rlib. The component ABI is wired once in the aggregating
# `checkleft-preinstalled-bundle` crate (a cdylib), which links this check into
# the single multiplexed preinstalled component. No `wit-bindgen` dependency is
# needed here because this crate does not call `export_checks!`.
[dependencies]
checkleft-check-sdk = { path = "../../../sdk" }
serde = { workspace = true, features = ["derive"] }
globset = { workspace = true }
regex = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
